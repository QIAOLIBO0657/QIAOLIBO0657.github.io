<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>孕期营养食谱 - 周计划点餐版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #f9f3f5;
            color: #333;
            padding-bottom: 70px;
            overflow-x: hidden;
        }

        .header {
            background-color: #f8bbd0;
            padding: 15px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .header h1 {
            font-size: 22px;
            color: #d81b60;
        }

        .category {
            display: flex;
            padding: 0;
            gap: 8px;
            overflow-x: auto;
            background: transparent;
            margin: 0;
            flex-wrap: wrap;
        }

        .category button {
            padding: 5px 10px;
            border: none;
            border-radius: 14px;
            background: #fce4ec;
            color: #d81b60;
            white-space: nowrap;
            cursor: pointer;
            transition: 0.3s;
            font-size: 12px;
        }

        .category button.active {
            background: #d81b60;
            color: white;
        }

        .filter-section {
            margin-bottom: 20px;
        }

        .filter-section:last-child {
            margin-bottom: 0;
        }

        .filter-label {
            font-size: 12px;
            color: #d81b60;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .recipe-page {
            display: flex;
            gap: 10px;
            padding: 8px;
            position: relative;
        }

        .recipe-list {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 8px;
            min-height: 200px;
            margin-right: 192px;
        }

        .filter-container {
            width: 180px;
            position: fixed;
            right: 8px;
            top: 72px;
            max-height: calc(100vh - 86px);
            overflow-y: auto;
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            z-index: 90;
        }

        .filter-container::-webkit-scrollbar {
            width: 6px;
        }

        .filter-container::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .filter-container::-webkit-scrollbar-thumb {
            background: #d81b60;
            border-radius: 10px;
        }

        .filter-container::-webkit-scrollbar-thumb:hover {
            background: #c2185b;
        }

        @media (max-width: 768px) {
            .filter-container {
                width: 132px;
                right: 6px;
                top: 70px;
                max-height: calc(100vh - 84px);
                padding: 8px;
            }

            .recipe-list {
                margin-right: 142px;
            }
        }



        .recipe-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: 0.3s;
        }

        .recipe-card:hover {
            transform: translateY(-3px);
        }

        .recipe-image {
            width: 100%;
            height: 96px;
            object-fit: cover;
            background-color: #fce4ec;
        }

        .recipe-info {
            padding: 6px;
        }

        .recipe-title {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 3px;
            color: #333;
        }

        .recipe-tag {
            display: inline-block;
            padding: 2px 5px;
            font-size: 10px;
            background: #f8bbd0;
            color: #d81b60;
            border-radius: 4px;
            margin-right: 3px;
        }

        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: white;
            display: flex;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
            z-index: 100;
        }

        .tab-item {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            color: #999;
            position: relative;
        }

        .tab-item.active {
            color: #d81b60;
        }

        .tab-item .badge {
            position: absolute;
            top: 5px;
            right: 20px;
            background: #ff4081;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 16px;
        }

        .tab-item i {
            font-size: 20px;
            display: block;
            margin-bottom: 2px;
        }

        .tab-item span {
            font-size: 12px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            border-radius: 15px;
            padding: 20px;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        .modal-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
            background-color: #fce4ec;
        }

        .modal-title {
            font-size: 20px;
            color: #d81b60;
            margin-bottom: 10px;
        }

        .modal-desc {
            line-height: 1.6;
            margin: 10px 0;
        }

        .ingredients-list {
            background: #fce4ec;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
        }

        .ingredients-list h4 {
            margin-bottom: 8px;
            color: #d81b60;
        }

        .ingredients-list ul {
            list-style: none;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
        }

        .ingredients-list li {
            font-size: 14px;
        }

        .plan-selector {
            background: #f8f8f8;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }

        .plan-selector h4 {
            margin-bottom: 10px;
            color: #d81b60;
        }

        .day-selector, .meal-selector {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .day-selector button, .meal-selector button {
            padding: 6px 12px;
            border: 1px solid #f8bbd0;
            border-radius: 15px;
            background: white;
            color: #d81b60;
            cursor: pointer;
            transition: 0.3s;
        }

        .day-selector button.active, .meal-selector button.active {
            background: #d81b60;
            color: white;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .collect-btn, .add-order-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }

        .collect-btn {
            background: #fce4ec;
            color: #d81b60;
        }

        .add-order-btn {
            background: #d81b60;
            color: white;
        }

        .order-page {
            display: none;
            padding: 15px;
        }

        .day-plan {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .day-title {
            font-size: 18px;
            font-weight: bold;
            color: #d81b60;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 2px solid #f8bbd0;
        }

        .meal-section {
            margin-bottom: 12px;
        }

        .meal-title {
            font-size: 15px;
            font-weight: bold;
            margin: 8px 0;
            color: #666;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
            margin-left: 10px;
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .order-item-name {
            font-size: 14px;
        }

        .del-order {
            color: #ff4081;
            font-size: 12px;
            cursor: pointer;
        }

        .shopping-list {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
        }

        .shopping-list h3 {
            color: #d81b60;
            margin-bottom: 15px;
        }

        .shopping-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed #f0f0f0;
        }

        .shopping-item:last-child {
            border-bottom: none;
        }

        .empty-tip {
            text-align: center;
            padding: 50px;
            color: #999;
        }

        .mine-page {
            display: none;
            padding: 15px;
        }

        .user-info {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #f8bbd0;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #d81b60;
        }

        .menu-list {
            background: white;
            border-radius: 12px;
            overflow: hidden;
        }

        .menu-item {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        img[src=""], img:not([src]) {
            opacity: 0;
        }

        .order-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 15px;
        }

        .clear-all-btn {
            background: #ff4081;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 15px;
            cursor: pointer;
        }

        .notify-wechat-btn {
            background: #07c160;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 15px;
            cursor: pointer;
        }
        .img-placeholder,.modal-placeholder{display:none;width:100%;background:#fce4ec;align-items:center;justify-content:center;color:#d81b60;font-size:40px}
        .img-placeholder{height:96px}
        .modal-placeholder{height:220px;border-radius:10px;margin-bottom:15px}


    </style>
</head>
<body>
    <div class="header">
        <h1>孕期营养食谱大全</h1>
    </div>

    <div class="recipe-page" id="recipePage">
        <div class="recipe-list" id="recipeList"></div>
        <div class="filter-container">
            <div class="filter-section">
                <div class="filter-label">🤰 孕期阶段</div>
                <div class="category" id="periodCategory">
                    <button class="active" data-filter-type="period" data-value="all">全部</button>
                    <button data-filter-type="period" data-value="early">孕早期</button>
                    <button data-filter-type="period" data-value="middle">孕中期</button>
                    <button data-filter-type="period" data-value="late">孕晚期</button>
                </div>
            </div>
            <div class="filter-section">
                <div class="filter-label">🍴 菜系分类</div>
                <div class="category" id="typeCategory">
                    <button class="active" data-filter-type="type" data-value="all">全部</button>
                    <button data-filter-type="type" data-value="vegetarian">素菜</button>
                    <button data-filter-type="type" data-value="staple">主食</button>
                    <button data-filter-type="type" data-value="porridge">粥</button>
                    <button data-filter-type="type" data-value="noodle">面条</button>
                    <button data-filter-type="type" data-value="drink">饮品</button>
                    <button data-filter-type="type" data-value="fruit">水果</button>
                    <button data-filter-type="type" data-value="meat">荤菜</button>
                </div>
            </div>
            <div class="filter-section" id="meatSourceSection" style="display:none;">
                <div class="filter-label">🥩 荤菜食材</div>
                <div class="category" id="meatSourceCategory">
                    <button class="active" data-filter-type="meatSource" data-value="all">全部</button>
                    <button data-filter-type="meatSource" data-value="pork">猪</button>
                    <button data-filter-type="meatSource" data-value="beef">牛</button>
                    <button data-filter-type="meatSource" data-value="mutton">羊</button>
                    <button data-filter-type="meatSource" data-value="chicken">鸡</button>
                    <button data-filter-type="meatSource" data-value="fish">鱼</button>
                    <button data-filter-type="meatSource" data-value="shrimp">虾</button>
                    <button data-filter-type="meatSource" data-value="rabbit">兔</button>
                    <button data-filter-type="meatSource" data-value="other">其他</button>
                </div>
            </div>
            <div class="filter-section">
                <div class="filter-label">⏰ 餐次选择</div>
                <div class="category" id="mealCategory">
                    <button class="active" data-filter-type="meal" data-value="all">全部</button>
                    <button data-filter-type="meal" data-value="breakfast">早餐</button>
                    <button data-filter-type="meal" data-value="lunch">午餐</button>
                    <button data-filter-type="meal" data-value="dinner">晚餐</button>
                    <button data-filter-type="meal" data-value="snack">加餐</button>
                </div>
            </div>
        </div>
    </div>

    <div class="order-page" id="orderPage">
        <div class="order-actions">
            <button class="notify-wechat-btn" id="notifyWechatBtn">通知微信</button>
            <button class="clear-all-btn" id="clearAllBtn">清空本周计划</button>
        </div>
        <div id="weeklyPlan"></div>
        <div class="shopping-list" id="shoppingList">
            <h3>📋 本周采购清单（自动汇总）</h3>
        </div>
    </div>

    <div class="mine-page" id="minePage">
        <div class="user-info">
            <div class="user-avatar">👩</div>
            <h3>孕妈用户</h3>
            <p>科学饮食，健康孕期</p>
        </div>
        <div class="menu-list">
            <div class="menu-item"><span>我的收藏</span><span>></span></div>
            <div class="menu-item"><span>历史记录</span><span>></span></div>
            <div class="menu-item"><span>关于我们</span><span>></span></div>
        </div>
    </div>

    <div class="modal" id="recipeModal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <img class="modal-image" id="modalImage" src="" alt="食谱图片" loading="lazy">
            <div class="modal-placeholder">🍽️</div>
            <h2 class="modal-title" id="modalTitle"></h2>
            <p><strong>孕期阶段：</strong><span id="modalType"></span> | <strong>菜系分类：</strong><span id="modalCategory"></span> | <strong>推荐餐次：</strong><span id="modalMeal"></span></p>
            <div class="ingredients-list"><h4>🥬 所需食材</h4><ul id="modalIngredients"></ul></div>
            <p class="modal-desc" id="modalDesc"></p>
            <div class="plan-selector">
                <h4>📅 添加到周计划</h4>
                <div class="day-selector" id="daySelector">
                    <button data-day="1" class="active">周一</button>
                    <button data-day="2">周二</button>
                    <button data-day="3">周三</button>
                    <button data-day="4">周四</button>
                    <button data-day="5">周五</button>
                </div>
                <div class="meal-selector" id="mealSelector">
                    <button data-meal="breakfast" class="active">早餐</button>
                    <button data-meal="lunch">午餐</button>
                    <button data-meal="dinner">晚餐</button>
                    <button data-meal="snack">加餐</button>
                </div>
            </div>
            <div class="modal-btns">
                <button class="collect-btn" id="collectBtn">收藏食谱</button>
                <button class="add-order-btn" id="addOrderBtn">添加到计划</button>
            </div>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" data-page="recipe"><i>🍳</i><span>食谱</span></div>
        <div class="tab-item" data-page="order"><i>📅</i><span>周计划</span><span class="badge" id="orderBadge" style="display: none;">0</span></div>
        <div class="tab-item" data-page="mine"><i>👤</i><span>我的</span></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const recipeData = [
            {id:1,title:"红枣小米粥",image:"images/1.png",type:"early",typeName:"孕早期",meal:"breakfast",mealName:"早餐",vegetarian:true,tag:"缓解孕吐",ingredients:[{name:"小米",amount:"50g"},{name:"红枣",amount:"3颗"},{name:"冰糖",amount:"少许"}],desc:"健脾养胃、缓解孕吐，食材简单，营养温和，非常适合孕早期食欲不振的孕妈。做法：小米洗净熬煮30分钟，加入红枣再煮10分钟即可。"},
            {id:2,title:"生姜乌梅饮",image:"images/2.png",type:"early",typeName:"孕早期",meal:"snack",mealName:"加餐",vegetarian:true,tag:"止吐神器",ingredients:[{name:"生姜",amount:"3片"},{name:"红枣",amount:"3颗"},{name:"乌梅",amount:"10粒"}],desc:"有效缓解孕早期孕吐反应，酸甜开胃，改善恶心症状。做法：所有食材加水煮15分钟，代茶饮即可。"},
            {id:3,title:"山药小米粥",image:"images/3.png",type:"early",typeName:"孕早期",meal:"dinner",mealName:"晚餐",vegetarian:true,tag:"清淡易消化",ingredients:[{name:"小米",amount:"40g"},{name:"山药",amount:"100g"},{name:"大米",amount:"30g"}],desc:"健脾养胃，易消化，适合孕早期肠胃不适的孕妈。做法：食材洗净切块，熬煮至软烂即可。"},
            {id:4,title:"蔬菜沙拉",image:"images/4.png",type:"early",typeName:"孕早期",meal:"lunch",mealName:"午餐",vegetarian:true,tag:"补充维生素",ingredients:[{name:"生菜",amount:"100g"},{name:"小番茄",amount:"50g"},{name:"黄瓜",amount:"50g"},{name:"沙拉酱",amount:"少许"}],desc:"清爽开胃，补充维生素，缓解孕吐，适合孕早期食欲不振。做法：食材洗净切块，拌匀即可。"},
            {id:5,title:"菠菜猪肝汤",image:"images/5.png",type:"middle",typeName:"孕中期",meal:"lunch",mealName:"午餐",vegetarian:false,tag:"补铁补血",ingredients:[{name:"猪肝",amount:"100g"},{name:"菠菜",amount:"150g"},{name:"姜片",amount:"2片"},{name:"盐",amount:"少许"}],desc:"补铁补血、预防孕期贫血，适合孕中期胎儿快速发育需求。做法：猪肝焯水去腥，加水煮沸后放入菠菜，煮5分钟调味即可。"},
            {id:6,title:"鲫鱼豆腐汤",image:"images/6.png",type:"middle",typeName:"孕中期",meal:"dinner",mealName:"晚餐",vegetarian:false,tag:"补钙下奶",ingredients:[{name:"鲫鱼",amount:"1条"},{name:"豆腐",amount:"200g"},{name:"葱姜",amount:"少许"},{name:"盐",amount:"少许"}],desc:"优质蛋白丰富，补钙又下奶，促进胎儿骨骼发育，汤鲜味美。做法：鲫鱼煎至金黄，加水煮沸，加入豆腐煮15分钟调味。"},
            {id:7,title:"虾仁蒸蛋",image:"images/7.png",type:"middle",typeName:"孕中期",meal:"breakfast",mealName:"早餐",vegetarian:false,tag:"高蛋白",ingredients:[{name:"鸡蛋",amount:"2个"},{name:"虾仁",amount:"50g"},{name:"葱花",amount:"少许"},{name:"生抽",amount:"少许"}],desc:"嫩滑易消化，补充优质蛋白，促进胎儿发育，适合孕中期营养补充。做法：鸡蛋打散加水，蒸8分钟，加入虾仁再蒸3分钟。"},
            {id:8,title:"西兰花炒虾仁",image:"images/8.png",type:"middle",typeName:"孕中期",meal:"lunch",mealName:"午餐",vegetarian:false,tag:"补叶酸",ingredients:[{name:"西兰花",amount:"200g"},{name:"虾仁",amount:"100g"},{name:"蒜末",amount:"少许"},{name:"盐",amount:"少许"}],desc:"西兰花富含叶酸，虾仁补充蛋白，营养均衡，适合孕中期胎儿神经管发育。做法：西兰花焯水，和虾仁一起炒熟即可。"},
            {id:9,title:"核桃牛奶",image:"images/9.png",type:"middle",typeName:"孕中期",meal:"snack",mealName:"加餐",vegetarian:true,tag:"补脑DHA",ingredients:[{name:"核桃",amount:"3个"},{name:"牛奶",amount:"200ml"}],desc:"补充DHA，促进胎儿大脑发育，口感香浓，加餐首选。做法：核桃打碎，加入温牛奶拌匀即可。"},
            {id:10,title:"清蒸鲈鱼",image:"images/10.png",type:"late",typeName:"孕晚期",meal:"lunch",mealName:"午餐",vegetarian:false,tag:"低脂肪高蛋白",ingredients:[{name:"鲈鱼",amount:"1条"},{name:"葱姜",amount:"少许"},{name:"蒸鱼豉油",amount:"少许"}],desc:"优质蛋白丰富、脂肪低，促进胎儿大脑发育，清淡不油腻，适合孕晚期控制体重。做法：鱼处理干净蒸10分钟，淋热油和蒸鱼豉油即可。"},
            {id:11,title:"南瓜山药粥",image:"images/11.png",type:"late",typeName:"孕晚期",meal:"breakfast",mealName:"早餐",vegetarian:true,tag:"润肠通便",ingredients:[{name:"南瓜",amount:"100g"},{name:"山药",amount:"100g"},{name:"大米",amount:"50g"}],desc:"健脾养胃、润肠通便，缓解孕晚期便秘，口感香甜，孕妈都爱吃。做法：所有食材切块熬煮至软烂即可。"},
            {id:12,title:"紫菜虾皮汤",image:"images/12.png",type:"late",typeName:"孕晚期",meal:"dinner",mealName:"晚餐",vegetarian:false,tag:"补钙补碘",ingredients:[{name:"紫菜",amount:"10g"},{name:"虾皮",amount:"20g"},{name:"鸡蛋",amount:"1个"},{name:"盐",amount:"少许"}],desc:"补钙补碘，清淡易消化，适合孕晚期水肿的孕妈，低钠健康。做法：水煮沸，加入紫菜虾皮，淋入蛋液，调味即可。"},
            {id:13,title:"冬瓜排骨汤",image:"images/13.png",type:"late",typeName:"孕晚期",meal:"dinner",mealName:"晚餐",vegetarian:false,tag:"消水肿",ingredients:[{name:"排骨",amount:"200g"},{name:"冬瓜",amount:"200g"},{name:"姜片",amount:"2片"},{name:"盐",amount:"少许"}],desc:"利水消肿，缓解孕晚期下肢水肿，清淡不油腻，补充蛋白。做法：排骨焯水，煮30分钟，加入冬瓜煮15分钟调味。"},
            {id:14,title:"杂粮饭",image:"images/14.png",type:"late",typeName:"孕晚期",meal:"lunch",mealName:"午餐",vegetarian:true,tag:"控血糖",ingredients:[{name:"糙米",amount:"30g"},{name:"小米",amount:"20g"},{name:"黑米",amount:"20g"},{name:"藜麦",amount:"10g"}],desc:"低升糖，控制孕晚期血糖，预防妊娠糖尿病，膳食纤维丰富。做法：所有杂粮洗净，蒸熟即可。"},
            {id:15,title:"猕猴桃酸奶",image:"images/15.png",type:"late",typeName:"孕晚期",meal:"snack",mealName:"加餐",vegetarian:true,tag:"补充维C",ingredients:[{name:"猕猴桃",amount:"1个"},{name:"酸奶",amount:"100g"}],desc:"补充维生素C，促进铁吸收，酸甜开胃，缓解孕晚期便秘。做法：猕猴桃切块，加入酸奶拌匀即可。"},
            {id:16,title:"全麦面包+牛奶",image:"images/16.png",type:"all",typeName:"全孕期",meal:"breakfast",mealName:"早餐",vegetarian:true,tag:"快手早餐",ingredients:[{name:"全麦面包",amount:"2片"},{name:"牛奶",amount:"200ml"},{name:"鸡蛋",amount:"1个"}],desc:"快手营养早餐，补充碳水和蛋白，适合忙碌的孕妈，全孕期都适用。做法：面包加热，牛奶加热，鸡蛋水煮即可。"},
            {id:17,title:"芹菜炒香干",image:"images/17.png",type:"all",typeName:"全孕期",meal:"lunch",mealName:"午餐",vegetarian:true,tag:"降血压",ingredients:[{name:"芹菜",amount:"200g"},{name:"香干",amount:"50g"},{name:"蒜末",amount:"少许"},{name:"盐",amount:"少许"}],desc:"降血压，预防孕期高血压，膳食纤维丰富，缓解便秘。做法：食材洗净，炒熟调味即可。"},
            {id:18,title:"海带豆腐汤",image:"images/18.png",type:"all",typeName:"全孕期",meal:"dinner",mealName:"晚餐",vegetarian:true,tag:"补碘补钙",ingredients:[{name:"海带",amount:"50g"},{name:"豆腐",amount:"100g"},{name:"盐",amount:"少许"}],desc:"补碘补钙，促进胎儿甲状腺发育，清淡健康，全孕期适用。做法：水煮沸，加入海带豆腐，煮10分钟调味。"},
            {id:19,title:"苹果",image:"images/19.png",type:"all",typeName:"全孕期",meal:"snack",mealName:"加餐",vegetarian:true,tag:"每日一苹果",ingredients:[{name:"苹果",amount:"1个"}],desc:"每天一个苹果，医生远离我，补充维生素，缓解孕吐，全孕期都可以吃。"},
            {id:20,title:"虾仁馄饨",image:"images/20.png",type:"late",typeName:"孕晚期",meal:"dinner",mealName:"晚餐",vegetarian:false,tag:"易消化",ingredients:[{name:"馄饨皮",amount:"20张"},{name:"虾仁",amount:"100g"},{name:"猪肉馅",amount:"50g"},{name:"葱花",amount:"少许"}],desc:"易消化，适合孕晚期肠胃受压的孕妈，补充蛋白，口感鲜美。做法：包好馄饨，煮熟即可。"},
            {id:21,title:"柠檬蜂蜜水",image:"images/21.png",type:"early",typeName:"孕早期",meal:"snack",mealName:"加餐",vegetarian:true,tag:"缓解孕吐",ingredients:[{name:"柠檬",amount:"2片"},{name:"蜂蜜",amount:"1勺"}],desc:"清新爽口，有效缓解孕早期恶心呕吐，补充维生素C。做法：柠檬片用温水冲泡，加入蜂蜜调味即可。"},
            {id:22,title:"番茄鸡蛋面",image:"images/22.png",type:"early",typeName:"孕早期",meal:"lunch",mealName:"午餐",vegetarian:true,tag:"易消化",ingredients:[{name:"面条",amount:"100g"},{name:"番茄",amount:"1个"},{name:"鸡蛋",amount:"1个"},{name:"葱花",amount:"少许"}],desc:"酸甜可口，易消化吸收，适合孕早期没胃口的时候吃。做法：番茄炒出汤汁，加水煮沸下面条，淋入蛋液即可。"},
            {id:23,title:"蒸南瓜",image:"images/23.png",type:"early",typeName:"孕早期",meal:"breakfast",mealName:"早餐",vegetarian:true,tag:"养胃",ingredients:[{name:"南瓜",amount:"200g"}],desc:"香甜软糯，健脾养胃，无需任何调料，营养又健康。做法：南瓜去皮切块，上锅蒸15分钟即可。"},
            {id:24,title:"番茄炖牛腩",image:"images/24.png",type:"middle",typeName:"孕中期",meal:"dinner",mealName:"晚餐",vegetarian:false,tag:"补铁",ingredients:[{name:"牛腩",amount:"200g"},{name:"番茄",amount:"2个"},{name:"葱姜",amount:"少许"},{name:"盐",amount:"少许"}],desc:"富含血红素铁，有效预防孕期贫血，口感软烂，营养丰富。做法：牛腩焯水后炖1小时，加入番茄再炖30分钟。"},
            {id:25,title:"香菇滑鸡",image:"images/25.png",type:"middle",typeName:"孕中期",meal:"lunch",mealName:"午餐",vegetarian:false,tag:"高蛋白",ingredients:[{name:"鸡腿肉",amount:"200g"},{name:"香菇",amount:"5朵"},{name:"姜片",amount:"2片"},{name:"生抽",amount:"少许"}],desc:"鸡肉嫩滑，香菇鲜美，补充优质蛋白，增强免疫力。做法：鸡肉腌制后和香菇一起蒸15分钟即可。"},
            {id:26,title:"玉米排骨汤",image:"images/26.png",type:"middle",typeName:"孕中期",meal:"dinner",mealName:"晚餐",vegetarian:false,tag:"补钙",ingredients:[{name:"排骨",amount:"200g"},{name:"玉米",amount:"1根"},{name:"胡萝卜",amount:"1根"},{name:"盐",amount:"少许"}],desc:"清甜可口，补钙又补锌，促进胎儿骨骼发育。做法：排骨焯水后煮30分钟，加入玉米胡萝卜再煮20分钟。"},
            {id:27,title:"清炒时蔬",image:"images/27.png",type:"late",typeName:"孕晚期",meal:"lunch",mealName:"午餐",vegetarian:true,tag:"高纤维",ingredients:[{name:"上海青",amount:"200g"},{name:"蒜末",amount:"少许"},{name:"盐",amount:"少许"}],desc:"清淡爽口，富含膳食纤维，缓解孕晚期便秘，控制体重。做法：蒜末爆香，加入上海青炒熟即可。"},
            {id:28,title:"银耳莲子羹",image:"images/28.png",type:"late",typeName:"孕晚期",meal:"snack",mealName:"加餐",vegetarian:true,tag:"润肺养颜",ingredients:[{name:"银耳",amount:"1朵"},{name:"莲子",amount:"10粒"},{name:"冰糖",amount:"少许"}],desc:"滋阴润肺，养颜美容，口感软糯香甜，适合孕晚期加餐。做法：银耳泡发后和莲子一起炖1小时，加入冰糖调味。"},
            {id:29,title:"水煮蛋",image:"images/29.png",type:"all",typeName:"全孕期",meal:"breakfast",mealName:"早餐",vegetarian:true,tag:"高蛋白",ingredients:[{name:"鸡蛋",amount:"1个"}],desc:"最简单的营养来源，富含优质蛋白和卵磷脂，全孕期必备。做法：鸡蛋冷水下锅，煮8分钟即可。"},
            {id:30,title:"豆浆",image:"images/30.png",type:"all",typeName:"全孕期",meal:"breakfast",mealName:"早餐",vegetarian:true,tag:"植物蛋白",ingredients:[{name:"黄豆",amount:"50g"},{name:"白糖",amount:"少许"}],desc:"富含植物蛋白和大豆异黄酮，营养丰富，适合早餐饮用。做法：黄豆泡发后打成豆浆，煮沸即可。"},
            {id:31,title:"全麦三明治",image:"images/31.png",type:"all",typeName:"全孕期",meal:"breakfast",mealName:"早餐",vegetarian:true,tag:"快手早餐",ingredients:[{name:"全麦面包",amount:"2片"},{name:"鸡蛋",amount:"1个"},{name:"生菜",amount:"2片"},{name:"番茄",amount:"2片"}],desc:"营养均衡的快手早餐，碳水、蛋白、维生素都有了。做法：面包片夹入煎蛋、生菜和番茄片即可。"},
            {id:32,title:"香蕉奶昔",image:"images/32.png",type:"all",typeName:"全孕期",meal:"snack",mealName:"加餐",vegetarian:true,tag:"润肠通便",ingredients:[{name:"香蕉",amount:"1根"},{name:"牛奶",amount:"200ml"}],desc:"香甜顺滑，润肠通便，缓解孕期便秘，快速补充能量。做法：香蕉和牛奶一起放入搅拌机打成奶昔即可。"},
            {id:33,title:"蒸鸡蛋羹",image:"images/33.png",type:"all",typeName:"全孕期",meal:"breakfast",mealName:"早餐",vegetarian:true,tag:"易消化",ingredients:[{name:"鸡蛋",amount:"2个"},{name:"温水",amount:"150ml"},{name:"生抽",amount:"少许"},{name:"香油",amount:"少许"}],desc:"嫩滑如布丁，易消化吸收，适合全孕期食用。做法：鸡蛋打散加温水，过筛后蒸10分钟，淋入生抽和香油。"},
            {id:34,title:"凉拌黄瓜",image:"images/34.png",type:"all",typeName:"全孕期",meal:"lunch",mealName:"午餐",vegetarian:true,tag:"清爽开胃",ingredients:[{name:"黄瓜",amount:"2根"},{name:"蒜末",amount:"少许"},{name:"生抽",amount:"少许"},{name:"醋",amount:"少许"}],desc:"清爽开胃，解腻消暑，适合夏天食用。做法：黄瓜拍碎，加入蒜末、生抽和醋拌匀即可。"},
            {id:35,title:"小米粥",image:"images/35.png",type:"all",typeName:"全孕期",meal:"dinner",mealName:"晚餐",vegetarian:true,tag:"养胃",ingredients:[{name:"小米",amount:"50g"}],desc:"最养胃的主食，清淡易消化，适合肠胃不适的时候吃。做法：小米洗净，加水熬煮30分钟至软烂即可。"},
            {id:36,title:"鱼香肉丝",image:"images/36.png",type:"all",typeName:"全孕期",meal:"lunch",mealName:"午餐",vegetarian:false,tag:"开胃下饭",ingredients:[{name:"猪肉丝",amount:"100g"},{name:"胡萝卜",amount:"50g"},{name:"木耳",amount:"30g"},{name:"青椒",amount:"50g"}],desc:"清淡版鱼香肉丝，酸甜开胃不辛辣，适合孕期食用，下饭又营养。做法：食材切丝炒熟，加入低盐调味汁翻炒均匀即可。"},
            {id:37,title:"回锅肉",image:"images/37.png",type:"all",typeName:"全孕期",meal:"lunch",mealName:"午餐",vegetarian:false,tag:"肥而不腻",ingredients:[{name:"五花肉",amount:"150g"},{name:"青椒",amount:"100g"},{name:"蒜苗",amount:"50g"},{name:"姜片",amount:"2片"}],desc:"少油版回锅肉，焯水去油脂，鲜香不腻，补充优质蛋白。做法：五花肉煮熟切片，少油翻炒，搭配蔬菜炒熟调味。"},
            {id:38,title:"地三鲜",image:"images/38.png",type:"all",typeName:"全孕期",meal:"lunch",mealName:"午餐",vegetarian:true,tag:"素菜鲜香",ingredients:[{name:"土豆",amount:"100g"},{name:"茄子",amount:"100g"},{name:"青椒",amount:"80g"},{name:"蒜末",amount:"少许"}],desc:"经典素菜，少油炸更健康，口感绵软鲜香，全孕期可食用。做法：食材切块，少油煎熟，调味翻炒即可。"},
            {id:39,title:"糖醋排骨",image:"images/39.png",type:"all",typeName:"全孕期",meal:"dinner",mealName:"晚餐",vegetarian:false,tag:"补钙补铁",ingredients:[{name:"精排骨",amount:"200g"},{name:"冰糖",amount:"10g"},{name:"醋",amount:"少许"},{name:"姜片",amount:"2片"}],desc:"酸甜适口，补钙补铁，促进胎儿骨骼发育，清淡版无过多添加剂。做法：排骨焯水，小火慢炖，糖醋调味。"},
            {id:40,title:"排骨汤",image:"images/40.png",type:"all",typeName:"全孕期",meal:"dinner",mealName:"晚餐",vegetarian:false,tag:"滋补营养",ingredients:[{name:"排骨",amount:"250g"},{name:"玉米",amount:"1根"},{name:"胡萝卜",amount:"1根"},{name:"盐",amount:"少许"}],desc:"清汤排骨汤，鲜甜滋补，补充钙质和蛋白质，适合全孕期营养补充。做法：排骨焯水，慢炖40分钟，加入蔬菜煮熟。"},
            {id:41,title:"糖醋里脊",image:"images/41.png",type:"all",typeName:"全孕期",meal:"lunch",mealName:"午餐",vegetarian:false,tag:"嫩滑高蛋白",ingredients:[{name:"猪里脊",amount:"150g"},{name:"淀粉",amount:"20g"},{name:"冰糖",amount:"少许"},{name:"醋",amount:"少许"}],desc:"肉质嫩滑，高蛋白低脂肪，酸甜开胃，孕期食欲不振可食用。做法：里脊裹淀粉煎熟，淋清淡糖醋汁翻炒。"},
            {id:42,title:"炒莲白",image:"images/42.png",type:"all",typeName:"全孕期",meal:"lunch",mealName:"午餐",vegetarian:true,tag:"清爽解腻",ingredients:[{name:"圆白菜",amount:"200g"},{name:"蒜末",amount:"少许"},{name:"盐",amount:"少许"}],desc:"清爽素菜，解腻助消化，富含维生素，快手易做。做法：圆白菜手撕成片，大火快炒，简单调味即可。"},
            {id:43,title:"青椒炒肉",image:"images/43.png",type:"all",typeName:"全孕期",meal:"lunch",mealName:"午餐",vegetarian:false,tag:"家常快手",ingredients:[{name:"瘦肉",amount:"100g"},{name:"青椒",amount:"150g"},{name:"生抽",amount:"少许"}],desc:"经典家常菜，清淡不辣，补充蛋白和维生素，制作简单。做法：瘦肉切片炒熟，加入青椒翻炒调味。"},
            {id:45,title:"土豆炒腊肉",image:"images/45.png",type:"all",typeName:"全孕期",meal:"lunch",mealName:"午餐",vegetarian:false,tag:"咸香下饭",ingredients:[{name:"腊肉",amount:"80g"},{name:"土豆",amount:"150g"},{name:"青椒",amount:"50g"}],desc:"低盐版腊肉炒制，搭配土豆鲜香软糯，偶尔食用解馋。做法：腊肉焯水去盐，土豆切片，一同炒熟。"},
            {id:44,title:"重庆烤鱼",image:"images/44.png",type:"all",typeName:"全孕期",meal:"dinner",mealName:"晚餐",vegetarian:false,tag:"高蛋白补脑",ingredients:[{name:"草鱼",amount:"300g"},{name:"豆芽",amount:"100g"},{name:"金针菇",amount:"80g"},{name:"姜片",amount:"少许"}],desc:"清淡不辣版烤鱼，鱼肉鲜嫩，富含DHA促进胎儿大脑发育。做法：鱼煎至金黄，加清水和蔬菜煮熟，低盐调味。"},
            {id:46,title:"双椒兔",image:"images/46.png",type:"all",typeName:"全孕期",meal:"dinner",mealName:"晚餐",vegetarian:false,tag:"低脂高蛋白",ingredients:[{name:"兔腿肉",amount:"150g"},{name:"青椒",amount:"100g"},{name:"红椒",amount:"50g"},{name:"姜片",amount:"2片"}],desc:"兔肉低脂高蛋白，营养易吸收，清淡版无辛辣，适合孕期食用。做法：兔肉切丁炒熟，搭配彩椒翻炒调味。"},
            {id:47,title:"大盘鸡",image:"images/47.png",type:"all",typeName:"全孕期",meal:"dinner",mealName:"晚餐",vegetarian:false,tag:"营养均衡",ingredients:[{name:"鸡腿肉",amount:"200g"},{name:"土豆",amount:"150g"},{name:"青椒",amount:"80g"},{name:"姜片",amount:"2片"}],desc:"清淡版大盘鸡，鸡肉软烂，土豆绵密，荤素搭配营养全。做法：鸡肉焯水炖熟，加入土豆蔬菜小火焖煮。"},
            {id:48,title:"红烧肉",image:"images/48.png",type:"all",typeName:"全孕期",meal:"dinner",mealName:"晚餐",vegetarian:false,tag:"补铁滋补",ingredients:[{name:"五花肉",amount:"200g"},{name:"冰糖",amount:"少许"},{name:"姜片",amount:"3片"},{name:"盐",amount:"少许"}],desc:"少油少糖版红烧肉，软烂入味，补铁补血，孕期适量食用。做法：五花肉焯水，小火慢炖，清淡调味。"},
            {id:49,title:"香菜牛肉",image:"images/49.png",type:"all",typeName:"全孕期",meal:"lunch",mealName:"午餐",vegetarian:false,tag:"补铁强身",ingredients:[{name:"牛里脊",amount:"150g"},{name:"香菜",amount:"50g"},{name:"姜片",amount:"2片"}],desc:"牛肉补铁效果佳，香菜提香，嫩滑爽口，适合孕期补铁。做法：牛肉切丝滑炒，加入香菜快速翻炒出锅。"},
            {id:50,title:"薄荷牛肉",image:"images/50.png",type:"all",typeName:"全孕期",meal:"lunch",mealName:"午餐",vegetarian:false,tag:"清香开胃",ingredients:[{name:"牛里脊",amount:"150g"},{name:"薄荷",amount:"30g"},{name:"蒜末",amount:"少许"}],desc:"薄荷清香解腻，牛肉鲜嫩高蛋白，开胃助消化，全孕期可食。做法：牛肉炒熟，加入薄荷翻炒均匀即可。"},
            {id:51,title:"洋葱牛肉",image:"images/51.png",type:"all",typeName:"全孕期",meal:"lunch",mealName:"午餐",vegetarian:false,tag:"增强免疫",ingredients:[{name:"牛肉",amount:"150g"},{name:"洋葱",amount:"100g"},{name:"生抽",amount:"少许"}],desc:"洋葱杀菌增强免疫力，牛肉补充蛋白，营养搭配超健康。做法：牛肉切片炒熟，加入洋葱炒软调味。"},
            {id:52,title:"葱炒羊肉",image:"images/52.png",type:"all",typeName:"全孕期",meal:"dinner",mealName:"晚餐",vegetarian:false,tag:"温补暖身",ingredients:[{name:"羊肉片",amount:"150g"},{name:"大葱",amount:"100g"},{name:"姜片",amount:"2片"}],desc:"羊肉温补暖身，大葱去腥提香，清淡版不膻不腻，孕期适量食用。做法：羊肉快速翻炒，加入大葱炒香调味。"},
            {id:53,title:"素炒西蓝花",image:"images/53.png",type:"all",typeName:"全孕期",meal:"snack",mealName:"加餐",vegetarian:true,tag:"补叶酸",ingredients:[{name:"西蓝花",amount:"200g"},{name:"蒜末",amount:"少许"},{name:"盐",amount:"少许"}],desc:"富含叶酸和维生素，清脆爽口，孕期必备素菜，低脂健康。做法：西蓝花焯水，蒜末爆香翻炒均匀。"},
            {id:54,title:"热拌青菜",image:"images/54.png",type:"all",typeName:"全孕期",meal:"dinner",mealName:"晚餐",vegetarian:true,tag:"高纤维",ingredients:[{name:"时令青菜",amount:"250g"},{name:"生抽",amount:"少许"},{name:"香油",amount:"少许"}],desc:"清淡热拌，保留青菜营养，高纤维缓解便秘，全孕期适用。做法：青菜焯水，淋上简单调料拌匀即可。"},
            {id:55,title:"清炒荷兰豆",image:"images/55.png",type:"all",typeName:"全孕期",meal:"lunch",mealName:"午餐",vegetarian:true,tag:"清脆高纤",ingredients:[{name:"荷兰豆",amount:"200g"},{name:"蒜末",amount:"少许"},{name:"盐",amount:"少许"}],desc:"口感清脆、膳食纤维丰富，适合孕期清淡饮食。做法：荷兰豆去筋洗净，蒜末爆香后快速翻炒调味即可。"},
            {id:56,title:"西兰花炒牛肉",image:"images/56.png",type:"all",typeName:"全孕期",meal:"lunch",mealName:"午餐",vegetarian:false,tag:"补铁优蛋白",ingredients:[{name:"牛肉",amount:"150g"},{name:"西兰花",amount:"200g"},{name:"姜片",amount:"2片"},{name:"生抽",amount:"少许"}],desc:"牛肉补铁，西兰花富含叶酸与维生素，搭配均衡。做法：牛肉先滑炒，再与焯水西兰花同炒，少盐调味。"},
            {id:57,title:"虾仁豆腐蛋",image:"images/57.png",type:"all",typeName:"全孕期",meal:"dinner",mealName:"晚餐",vegetarian:false,tag:"嫩滑易消化",ingredients:[{name:"虾仁",amount:"80g"},{name:"嫩豆腐",amount:"200g"},{name:"鸡蛋",amount:"1个"},{name:"葱花",amount:"少许"}],desc:"高蛋白且口感软嫩，适合孕期晚餐补充营养。做法：虾仁炒至变色，加入豆腐和蛋液小火焖煮定型即可。"},
            {id:58,title:"蒸红薯",image:"images/58.png",type:"all",typeName:"全孕期",meal:"breakfast",mealName:"早餐",vegetarian:true,tag:"天然粗粮",ingredients:[{name:"红薯",amount:"250g"}],desc:"富含膳食纤维和复合碳水，饱腹感强。做法：红薯洗净切段，上锅蒸20分钟左右至软糯。"},
            {id:59,title:"番茄土豆牛腩",image:"images/59.png",type:"all",typeName:"全孕期",meal:"dinner",mealName:"晚餐",vegetarian:false,tag:"补铁暖胃",ingredients:[{name:"牛腩",amount:"220g"},{name:"番茄",amount:"2个"},{name:"土豆",amount:"1个"},{name:"姜片",amount:"2片"}],desc:"番茄酸甜开胃，牛腩补铁，土豆补充能量，适合作为孕期正餐。做法：牛腩焯水后炖软，加入番茄土豆继续炖煮至入味。"},
            {id:60,title:"老式鸡蛋汤",image:"images/60.png",type:"all",typeName:"全孕期",meal:"dinner",mealName:"晚餐",vegetarian:true,tag:"清淡暖胃",ingredients:[{name:"鸡蛋",amount:"1个"},{name:"紫菜",amount:"少许"},{name:"香油",amount:"少许"},{name:"盐",amount:"少许"}],desc:"做法简单，清淡易吸收，适合孕期不想吃油腻时饮用。做法：水开后调味，淋入蛋液并轻轻搅散，最后滴香油。"},
            {id:61,title:"粉蒸菜",image:"images/61.png",type:"all",typeName:"全孕期",meal:"lunch",mealName:"午餐",vegetarian:true,tag:"少油蒸制",ingredients:[{name:"时令蔬菜",amount:"250g"},{name:"蒸菜粉",amount:"30g"},{name:"蒜末",amount:"少许"}],desc:"蒸制方式少油健康，保留蔬菜原味。做法：蔬菜拌蒸菜粉，上锅蒸熟后拌少量蒜末即可。"},
            {id:62,title:"海鲜粥",image:"images/62.png",type:"all",typeName:"全孕期",meal:"breakfast",mealName:"早餐",vegetarian:false,tag:"鲜香主食",ingredients:[{name:"大米",amount:"60g"},{name:"虾仁",amount:"60g"},{name:"鱼片",amount:"60g"},{name:"姜丝",amount:"少许"}],desc:"粥品温和易消化，搭配海鲜可补充优质蛋白。做法：大米先熬粥底，再加入海鲜煮熟调味。"},
            {id:63,title:"葱油发面饼",image:"images/63.png",type:"all",typeName:"全孕期",meal:"breakfast",mealName:"早餐",vegetarian:true,tag:"发酵主食",ingredients:[{name:"面粉",amount:"150g"},{name:"酵母",amount:"2g"},{name:"葱花",amount:"少许"},{name:"食用油",amount:"少许"}],desc:"发酵后口感松软，适合作为早餐主食。做法：面团发酵后擀开抹葱油，平底锅小火烙熟。"},
            {id:64,title:"肉饼",image:"images/64.png",type:"all",typeName:"全孕期",meal:"lunch",mealName:"午餐",vegetarian:false,tag:"补蛋白",ingredients:[{name:"猪肉馅",amount:"180g"},{name:"葱末",amount:"少许"},{name:"姜末",amount:"少许"},{name:"面粉",amount:"80g"}],desc:"荤素搭配可作为加餐或正餐主菜，注意少油少盐。做法：调好肉馅后包入面皮，平底锅煎熟至两面金黄。"},
            {id:65,title:"馒头",image:"images/65.png",type:"all",typeName:"全孕期",meal:"breakfast",mealName:"早餐",vegetarian:true,tag:"经典主食",ingredients:[{name:"面粉",amount:"200g"},{name:"酵母",amount:"2g"},{name:"温水",amount:"适量"}],desc:"发酵主食，口感松软，搭配牛奶或蛋类更均衡。做法：面团发酵整形后蒸15分钟即可。"},
            {id:66,title:"蒸包",image:"images/66.png",type:"all",typeName:"全孕期",meal:"breakfast",mealName:"早餐",vegetarian:true,tag:"软糯主食",ingredients:[{name:"面粉",amount:"180g"},{name:"白菜",amount:"100g"},{name:"香菇",amount:"50g"},{name:"酵母",amount:"2g"}],desc:"蒸制方式更清淡，作为早餐主食负担较小。做法：发面后包入素馅，上锅蒸熟即可。"},
            {id:67,title:"水煎包",image:"images/67.png",type:"all",typeName:"全孕期",meal:"breakfast",mealName:"早餐",vegetarian:false,tag:"外脆里软",ingredients:[{name:"面粉",amount:"180g"},{name:"猪肉馅",amount:"120g"},{name:"白菜",amount:"100g"},{name:"葱姜",amount:"少许"}],desc:"口感外脆内软，建议少油制作并搭配蔬菜汤。做法：包好后先煎底，再加少量水焖熟收干。"},
            {id:68,title:"油泼面",image:"images/68.png",type:"all",typeName:"全孕期",meal:"lunch",mealName:"午餐",vegetarian:true,tag:"香辣开胃",ingredients:[{name:"手擀面",amount:"150g"},{name:"蒜末",amount:"少许"},{name:"葱花",amount:"少许"},{name:"生抽",amount:"少许"},{name:"食用油",amount:"少许"}],desc:"孕期清淡版油泼面，少辣或不辣，热油激香蒜末葱花，简单过瘾。做法：面条煮熟，铺上蒜末葱花，淋生抽后浇热油拌匀。"},
            {id:69,title:"红薯面条",image:"images/69.png",type:"all",typeName:"全孕期",meal:"lunch",mealName:"午餐",vegetarian:true,tag:"粗粮主食",ingredients:[{name:"红薯面条",amount:"150g"},{name:"青菜",amount:"100g"},{name:"盐",amount:"少许"}],desc:"红薯面富含膳食纤维，升糖较慢，适合控制血糖的孕妈。做法：面条煮熟捞起，搭配焯水青菜，简单调味即可。"},
            {id:70,title:"饸饹面",image:"images/70.png",type:"all",typeName:"全孕期",meal:"lunch",mealName:"午餐",vegetarian:false,tag:"筋道耐饱",ingredients:[{name:"荞麦饸饹面",amount:"150g"},{name:"牛肉片",amount:"80g"},{name:"葱花",amount:"少许"},{name:"盐",amount:"少许"}],desc:"荞麦饸饹面富含矿物质，搭配牛肉补铁，筋道耐饱。做法：面条煮熟，加入清汤和牛肉片，简单调味。"},
            {id:71,title:"手擀面",image:"images/71.png",type:"all",typeName:"全孕期",meal:"lunch",mealName:"午餐",vegetarian:true,tag:"家常主食",ingredients:[{name:"面粉",amount:"150g"},{name:"鸡蛋",amount:"1个"},{name:"青菜",amount:"100g"}],desc:"手工制作更有嚼劲，搭配鸡蛋青菜营养均衡。做法：和面擀薄切条，煮熟后加鸡蛋青菜调味即可。"},
            {id:72,title:"牛肉面",image:"images/72.png",type:"all",typeName:"全孕期",meal:"lunch",mealName:"午餐",vegetarian:false,tag:"补铁耐饱",ingredients:[{name:"面条",amount:"150g"},{name:"牛肉",amount:"100g"},{name:"萝卜",amount:"80g"},{name:"葱姜",amount:"少许"}],desc:"牛肉补铁，汤底鲜美，孕期清淡版少辣不放花椒。做法：牛肉炖软取汤，放入面条和萝卜煮熟调味。"},
            {id:73,title:"青椒鸡蛋面",image:"images/73.png",type:"all",typeName:"全孕期",meal:"lunch",mealName:"午餐",vegetarian:true,tag:"快手营养",ingredients:[{name:"面条",amount:"150g"},{name:"鸡蛋",amount:"2个"},{name:"青椒",amount:"100g"},{name:"蒜末",amount:"少许"}],desc:"简单快手，青椒鸡蛋的经典搭配，营养均衡。做法：先炒青椒鸡蛋，加水煮沸下面条，调味即可。"},
            {id:74,title:"重庆小面",image:"images/74.png",type:"all",typeName:"全孕期",meal:"breakfast",mealName:"早餐",vegetarian:true,tag:"鲜香早餐",ingredients:[{name:"细面条",amount:"120g"},{name:"榨菜",amount:"少许"},{name:"芝麻酱",amount:"少许"},{name:"生抽",amount:"少许"}],desc:"孕期清淡版小面，去除辣椒保留鲜香，富有地方特色。做法：面条煮熟，加入调料拌匀，撒葱花即可。"},
            {id:75,title:"打卤面",image:"images/75.png",type:"all",typeName:"全孕期",meal:"lunch",mealName:"午餐",vegetarian:false,tag:"浓香下饭",ingredients:[{name:"面条",amount:"150g"},{name:"猪肉片",amount:"80g"},{name:"鸡蛋",amount:"1个"},{name:"木耳",amount:"30g"},{name:"淀粉",amount:"少许"}],desc:"浓郁卤汁裹着面条，荤素搭配，营养丰富。做法：炒肉片加水，加木耳鸡蛋勾芡成卤，浇在煮熟面条上。"},
            {id:76,title:"过油肉拌面",image:"images/76.png",type:"all",typeName:"全孕期",meal:"lunch",mealName:"午餐",vegetarian:false,tag:"补铁满足感",ingredients:[{name:"面条",amount:"150g"},{name:"猪里脊",amount:"100g"},{name:"洋葱",amount:"80g"},{name:"青椒",amount:"50g"}],desc:"过油肉嫩滑鲜香，拌入面条满足感十足，孕期清淡版少油制作。做法：里脊炒熟加蔬菜翻炒，拌入煮好的面条调味。"},
            {id:77,title:"炒面",image:"images/77.png",type:"all",typeName:"全孕期",meal:"lunch",mealName:"午餐",vegetarian:false,tag:"快手主食",ingredients:[{name:"熟面条",amount:"150g"},{name:"鸡蛋",amount:"1个"},{name:"圆白菜",amount:"100g"},{name:"胡萝卜",amount:"50g"}],desc:"经典炒面，荤素搭配，快手营养。做法：面条提前煮熟放凉，炒鸡蛋蔬菜后加入面条翻炒调味。"},
            {id:78,title:"炒方便面",image:"images/78.png",type:"all",typeName:"全孕期",meal:"snack",mealName:"加餐",vegetarian:false,tag:"偶尔解馋",ingredients:[{name:"方便面饼",amount:"1块"},{name:"鸡蛋",amount:"1个"},{name:"青菜",amount:"80g"},{name:"葱花",amount:"少许"}],desc:"孕期偶尔食用，建议丢弃调料包减少盐分，搭配鸡蛋青菜更均衡。做法：面饼煮熟，加鸡蛋青菜炒匀，少盐调味即可。"},
            {id:79,title:"桃",image:"images/79.png",type:"all",typeName:"全孕期",meal:"snack",mealName:"加餐",vegetarian:true,tag:"补钾润肠",ingredients:[{name:"桃",amount:"1个"}],desc:"富含钾和膳食纤维，有助于缓解孕期便秘，甜香多汁。"},
            {id:80,title:"西瓜",image:"images/80.png",type:"middle",typeName:"孕中期",meal:"snack",mealName:"加餐",vegetarian:true,tag:"消暑补水",ingredients:[{name:"西瓜",amount:"200g"}],desc:"含水量高，消暑解渴，富含番茄红素，孕中晚期适量食用（血糖高者需控量）。"},
            {id:81,title:"樱桃",image:"images/81.png",type:"all",typeName:"全孕期",meal:"snack",mealName:"加餐",vegetarian:true,tag:"补铁补血",ingredients:[{name:"樱桃",amount:"100g"}],desc:"铁含量较高，有助于预防孕期贫血，酸甜可口。"},
            {id:82,title:"蓝莓",image:"images/82.png",type:"all",typeName:"全孕期",meal:"snack",mealName:"加餐",vegetarian:true,tag:"抗氧化护眼",ingredients:[{name:"蓝莓",amount:"100g"}],desc:"富含花青素，抗氧化效果好，有益眼部健康，全孕期可食用。"},
            {id:83,title:"香蕉",image:"images/83.png",type:"all",typeName:"全孕期",meal:"snack",mealName:"加餐",vegetarian:true,tag:"润肠补钾",ingredients:[{name:"香蕉",amount:"1根"}],desc:"富含钾和膳食纤维，有助于缓解孕期便秘和抽筋，能量补充快。"},
            {id:84,title:"草莓",image:"images/84.png",type:"all",typeName:"全孕期",meal:"snack",mealName:"加餐",vegetarian:true,tag:"补充维C",ingredients:[{name:"草莓",amount:"150g"}],desc:"维生素C含量丰富，促进铁吸收，酸甜开胃，孕早期缓解食欲不振。"},
            {id:85,title:"梨",image:"images/85.png",type:"all",typeName:"全孕期",meal:"snack",mealName:"加餐",vegetarian:true,tag:"润肺止咳",ingredients:[{name:"梨",amount:"1个"}],desc:"润肺化痰，生津止渴，孕期咽干或咳嗽时可以多吃。"},
            {id:86,title:"油桃",image:"images/86.png",type:"all",typeName:"全孕期",meal:"snack",mealName:"加餐",vegetarian:true,tag:"补铁促消化",ingredients:[{name:"油桃",amount:"1个"}],desc:"含铁量较高，有助于预防贫血，皮薄汁多，口感甜脆。"},
            {id:87,title:"火龙果",image:"images/87.png",type:"all",typeName:"全孕期",meal:"snack",mealName:"加餐",vegetarian:true,tag:"润肠高纤",ingredients:[{name:"火龙果",amount:"半个"}],desc:"富含膳食纤维，促进肠胃蠕动，缓解孕期便秘，低糖适合孕期食用。"},
            {id:88,title:"李子",image:"images/88.png",type:"all",typeName:"全孕期",meal:"snack",mealName:"加餐",vegetarian:true,tag:"开胃消食",ingredients:[{name:"李子",amount:"2个"}],desc:"酸甜开胃，助消化，孕早期食欲不振时可适量食用，不宜过多。"},

                    return localData;
                }

                console.log('[同步] 正在从云端读取数据...');
                const { data, error } = await this.supabaseClient
                    .from('pregnancy_user_data')
                    .select('collect_list,weekly_plan_data')
                    .eq('sync_key', GLOBAL_SYNC_KEY)
                    .maybeSingle();

                if(error) {
                    console.error('[同步] 读取云端数据失败，使用本地数据', error);
                    return localData;
                }

                console.log('[同步] 云端数据读取成功', data);
                const collectList = data?.collect_list || localData.collectList;
                const weeklyPlanData = data?.weekly_plan_data || localData.weeklyPlanData;
                localStorage.setItem('pregnancyCollect', JSON.stringify(collectList));
                localStorage.setItem('pregnancyWeeklyPlan', JSON.stringify(weeklyPlanData));
                return { collectList, weeklyPlanData };
            },
            async saveCollectList(collectList) {
                localStorage.setItem('pregnancyCollect', JSON.stringify(collectList));
                if(this.mode !== 'supabase' || !this.supabaseClient) return;
                console.log('[同步] 正在同步收藏到云端...');
                await this.upsertData({ collect_list: collectList });
            },
            async saveWeeklyPlanData(weeklyPlanData) {
                localStorage.setItem('pregnancyWeeklyPlan', JSON.stringify(weeklyPlanData));
                if(this.mode !== 'supabase' || !this.supabaseClient) return;
                console.log('[同步] 正在同步周计划到云端...');
                await this.upsertData({ weekly_plan_data: weeklyPlanData });
            },
            async upsertData(partialData) {
                const { error } = await this.supabaseClient
                    .from('pregnancy_user_data')
                    .upsert({ sync_key: GLOBAL_SYNC_KEY, ...partialData }, { onConflict: 'sync_key' });
                if(error) {
                    console.error('[同步] 同步云端失败，已保留本地数据', error);
                } else {
                    console.log('[同步] 云端同步成功 ✓');
                }
            }
        };
        
        let currentRecipe = null;
        let selectedDay = 1;
        let selectedMeal = "breakfast";
        let collectList = JSON.parse(localStorage.getItem('pregnancyCollect')) || [];
        let weeklyPlanData = JSON.parse(localStorage.getItem('pregnancyWeeklyPlan')) || getDefaultWeeklyPlan();

        let currentFilters = {
            period: 'all',
            type: 'all',
            meal: 'all',
            meatSource: 'all'
        };

        const meatSourceNames = {
            pork: '猪肉',
            beef: '牛肉',
            mutton: '羊肉',
            chicken: '鸡肉',
            fish: '鱼类',
            shrimp: '虾类',
            rabbit: '兔肉',
            other: '其他肉类'
        };

        const vegTypeNames = {
            vegetarian: '素菜',
            drink: '饮品',
            fruit: '水果'
        };

        function getVegType(recipe) {
            const title = recipe.title;
            const text = `${title} ${recipe.ingredients.map(ing => ing.name).join(' ')}`;

            // 面条优先识别（含"面"但排除发面饼、面包）
            if(/面/.test(title) && !/发面|面包/.test(title)) return 'noodle';
            // 粥类
            if(/粥|老式鸡蛋汤|银耳莲子羹/.test(title)) return 'porridge';
            // 主食支持荤素共同分类
            if(/馄饨|饭|三明治|馒头|花卷|包|发面饼|饼|蒸红薯|蒸南瓜/.test(title)) return 'staple';
            if(!recipe.vegetarian) return 'none';

            // 用户指定优先分类（优先级最高）
            if(/全麦面包\+牛奶|水煮蛋|蒸鸡蛋羹/.test(title)) return 'vegetarian';
            if(/炒杏鲍菇/.test(title)) return 'vegetarian';
            if(/猕猴桃酸奶|香蕉奶昔/.test(title)) return 'drink';
            // 先判断水果，避免“猕猴桃酸奶”被优先识别成饮品
            if(/苹果|猕猴桃|香蕉|水果|桃|西瓜|樱桃|蓝莓|草莓|梨|油桃|火龙果|李子|杏|枇杷|人参果|榴莲|芒果|葡萄|红提|青提|哈密瓜|荔枝|奇异果/.test(text)) return 'fruit';
            if(/豆浆|牛奶|奶昔|饮|水|酸奶|蜂蜜水/.test(text)) return 'drink';
            return 'vegetarian';
        }

        function getMeatSource(recipe) {
            if(recipe.vegetarian) return 'none';
            const ingredientText = recipe.ingredients.map(ing => ing.name).join(' ');
            const titleText = recipe.title;
            const text = `${titleText} ${ingredientText}`;

            // 优先匹配更明确的肉类，避免“鸡蛋”这类词干扰肉类识别
            if(/鱼香肉丝/.test(titleText)) return 'pork';
            if(/兔/.test(text)) return 'rabbit';
            if(/牛|牛腩|牛里脊/.test(text)) return 'beef';
            if(/羊/.test(text)) return 'mutton';
            if(/虾|虾皮/.test(text)) return 'shrimp';
            if(/鲈|鲫|草鱼|鱼/.test(text)) return 'fish';
            if(/猪|里脊|五花|排骨|腊肉|猪肝|猪肉|肉馅|瘦肉|肉饼/.test(text)) return 'pork';
            if(/鸡/.test(text) && !/鸡蛋/.test(text)) return 'chicken';
            return 'other';
        }

        async function init() {
            await storageLayer.init();
            const syncedData = await storageLayer.loadData();
            collectList = syncedData.collectList;
            weeklyPlanData = syncedData.weeklyPlanData;
            renderRecipes();
            updateOrderBadge();
            renderWeeklyPlan();
            initSelectors();
        }

        function initSelectors() {
            daySelector.querySelectorAll('button').forEach(btn => {
                btn.onclick = () => {
                    daySelector.querySelectorAll('button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedDay = parseInt(btn.dataset.day);
                };
            });
            mealSelector.querySelectorAll('button').forEach(btn => {
                btn.onclick = () => {
                    mealSelector.querySelectorAll('button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedMeal = btn.dataset.meal;
                };
            });
        }

        function renderRecipes(filterType = null, filterValue = null) {
            if(filterType && filterValue !== null) {
                currentFilters[filterType] = filterValue;
                if(filterType === 'meatSource' && filterValue !== 'all') {
                    currentFilters.type = 'meat';
                    const typeButtons = document.querySelectorAll('#typeCategory button');
                    typeButtons.forEach(btn => btn.classList.remove('active'));
                    const meatBtn = document.querySelector('#typeCategory button[data-value="meat"]');
                    if(meatBtn) meatBtn.classList.add('active');
                }
                if(filterType === 'type') {
                    const meatSourceSection = document.getElementById('meatSourceSection');
                    if(filterValue === 'meat') {
                        meatSourceSection.style.display = '';
                    } else {
                        meatSourceSection.style.display = 'none';
                        currentFilters.meatSource = 'all';
                        const meatSourceButtons = document.querySelectorAll('#meatSourceCategory button');
                        meatSourceButtons.forEach(btn => btn.classList.remove('active'));
                        const allBtn = document.querySelector('#meatSourceCategory button[data-value="all"]');
                        if(allBtn) allBtn.classList.add('active');
                    }
                }
            }
            recipeList.innerHTML = '';
            let filterData = recipeData.filter(item => {
                let matchPeriod = currentFilters.period === 'all' || item.type === currentFilters.period;
                let matchType = true;
                if(currentFilters.type === 'vegetarian') {
                    matchType = item.vegetarian && getVegType(item) === 'vegetarian';
                } else if(currentFilters.type === 'staple') {
                    matchType = getVegType(item) === 'staple';
                } else if(currentFilters.type === 'porridge') {
                    matchType = getVegType(item) === 'porridge';
                } else if(currentFilters.type === 'noodle') {
                    matchType = getVegType(item) === 'noodle';
                } else if(currentFilters.type === 'drink') {
                    matchType = item.vegetarian && getVegType(item) === 'drink';
                } else if(currentFilters.type === 'fruit') {
                    matchType = item.vegetarian && getVegType(item) === 'fruit';
                } else if(currentFilters.type === 'meat') {
                    matchType = !item.vegetarian && getVegType(item) !== 'staple' && getVegType(item) !== 'porridge' && getVegType(item) !== 'noodle';
                }
                let matchMeal = currentFilters.meal === 'all' || item.meal === currentFilters.meal;
                let matchMeatSource = currentFilters.meatSource === 'all' || (!item.vegetarian && getMeatSource(item) === currentFilters.meatSource);
                return matchPeriod && matchType && matchMeal && matchMeatSource;
            });
            filterData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'recipe-card';
                const vegType = getVegType(item);
                const typeLabel = vegType === 'noodle' ? '🍜 面条' : (vegType === 'staple' ? '� 主食' : (vegType === 'porridge' ? '🥣 粥' : (item.vegetarian ? (vegType === 'drink' ? '🥤 饮品' : (vegType === 'fruit' ? '🍎 水果' : '🥬 素菜')) : '🍖 荤菜')));
                const meatSourceTag = !item.vegetarian ? `<span class="recipe-tag">${meatSourceNames[getMeatSource(item)]}</span>` : '';
                card.innerHTML = `<img src="${item.image}" alt="${item.title}" class="recipe-image" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"><div class="img-placeholder">🍽️</div><div class="recipe-info"><div class="recipe-title">${item.title}</div><span class="recipe-tag">${item.typeName}</span><span class="recipe-tag">${typeLabel}</span>${meatSourceTag}<span class="recipe-tag">${item.tag}</span></div>`;
                card.onclick = () => openModal(item);
                recipeList.appendChild(card);
            });
        }

        function openModal(recipe) {
            currentRecipe = recipe;
            const modalImage = document.getElementById('modalImage');
            modalImage.src = recipe.image;
            modalImage.onerror = function() {this.style.display='none';document.querySelector('.modal-placeholder').style.display='flex'};
            document.getElementById('modalTitle').innerText = recipe.title;
            document.getElementById('modalType').innerText = recipe.typeName;
            const vegType = getVegType(recipe);
            const typeLabel = vegType === 'noodle' ? '🍜 面条' : (vegType === 'staple' ? '� 主食' : (vegType === 'porridge' ? '🥣 粥' : (recipe.vegetarian ? (vegType === 'drink' ? '🥤 饮品' : (vegType === 'fruit' ? '🍎 水果' : '🥬 素菜')) : '🍖 荤菜')));
            const meatSourceText = recipe.vegetarian ? '' : `（${meatSourceNames[getMeatSource(recipe)]}）`;
            document.getElementById('modalCategory').innerText = `${typeLabel}${meatSourceText}`;
            document.getElementById('modalMeal').innerText = recipe.mealName;
            document.getElementById('modalDesc').innerText = recipe.desc;
            const ingredientsUl = document.getElementById('modalIngredients');
            ingredientsUl.innerHTML = '';
            recipe.ingredients.forEach(ing => {
                const li = document.createElement('li');
                li.innerText = `${ing.name} ${ing.amount}`;
                ingredientsUl.appendChild(li);
            });
            collectBtn.innerText = collectList.includes(recipe.id) ? '已收藏' : '收藏食谱';
            modal.style.display = 'flex';
        }

        closeBtn.onclick = () => modal.style.display = 'none';
        window.onclick = (e) => e.target === modal && (modal.style.display = 'none');

        collectBtn.onclick = () => {
            const id = currentRecipe.id;
            if(collectList.includes(id)) {
                collectList = collectList.filter(item => item !== id);
                collectBtn.innerText = '收藏食谱';
                alert('已取消收藏');
            } else {
                collectList.push(id);
                collectBtn.innerText = '已收藏';
                alert('收藏成功');
            }
            storageLayer.saveCollectList(collectList);
        };

        addOrderBtn.onclick = () => {
            const alreadyAdded = weeklyPlanData[selectedDay][selectedMeal].some(item => item.id === currentRecipe.id);
            if(alreadyAdded) {alert(`这道菜已经添加到${days[selectedDay-1]}${mealNames[selectedMeal]}啦~`);return;}
            weeklyPlanData[selectedDay][selectedMeal].push(currentRecipe);
            storageLayer.saveWeeklyPlanData(weeklyPlanData);
            updateOrderBadge();
            renderWeeklyPlan();
            alert(`已成功添加到${days[selectedDay-1]}${mealNames[selectedMeal]}！`);
            modal.style.display = 'none';
        };

        function updateOrderBadge() {
            let total = 0;
            for(let day in weeklyPlanData) {for(let meal in weeklyPlanData[day]) {total += weeklyPlanData[day][meal].length;}}
            if(total > 0) {orderBadge.style.display = 'block';orderBadge.innerText = total;} else {orderBadge.style.display = 'none';}
        }

        function renderWeeklyPlan() {
            weeklyPlan.innerHTML = '';
            let hasContent = false;
            for(let day=1;day<=5;day++){
                const dayData=weeklyPlanData[day];
                const dayHasContent=meals.some(meal=>dayData[meal].length>0);
                if(!dayHasContent) continue; hasContent=true;
                const dayDiv=document.createElement('div');dayDiv.className='day-plan';dayDiv.innerHTML=`<div class="day-title">📅 ${days[day-1]}</div>`;
                meals.forEach(meal=>{
                    const mealData=dayData[meal];
                    if(mealData.length===0) return;
                    const mealDiv=document.createElement('div');mealDiv.className='meal-section';mealDiv.innerHTML=`<div class="meal-title">🍽️ ${mealNames[meal]}</div>`;
                    
                    // 分离素菜和荤菜
                    const vegetarianItems = mealData.filter(item => item.vegetarian);
                    const meatItems = mealData.filter(item => !item.vegetarian);
                    
                    // 显示素菜
                    if(vegetarianItems.length > 0) {
                        const vegLabel = document.createElement('div');
                        vegLabel.style.fontSize = '12px';
                        vegLabel.style.color = '#999';
                        vegLabel.style.marginLeft = '10px';
                        vegLabel.style.marginTop = '5px';
                        vegLabel.innerText = '🥬 素菜';
                        mealDiv.appendChild(vegLabel);
                        vegetarianItems.forEach(item=>{
                            const orderItem=document.createElement('div');orderItem.className='order-item';
                            orderItem.innerHTML=`<span class="order-item-name">${item.title}</span><span class="del-order" data-day="${day}" data-meal="${meal}" data-id="${item.id}">删除</span>`;
                            mealDiv.appendChild(orderItem);
                        });
                    }
                    
                    // 显示荤菜
                    if(meatItems.length > 0) {
                        const meatLabel = document.createElement('div');
                        meatLabel.style.fontSize = '12px';
                        meatLabel.style.color = '#999';
                        meatLabel.style.marginLeft = '10px';
                        meatLabel.style.marginTop = '5px';
                        meatLabel.innerText = '🍖 荤菜';
                        mealDiv.appendChild(meatLabel);
                        meatItems.forEach(item=>{
                            const orderItem=document.createElement('div');orderItem.className='order-item';
                            orderItem.innerHTML=`<span class="order-item-name">${item.title}</span><span class="del-order" data-day="${day}" data-meal="${meal}" data-id="${item.id}">删除</span>`;
                            mealDiv.appendChild(orderItem);
                        });
                    }
                    
                    dayDiv.appendChild(mealDiv);
                });
                weeklyPlan.appendChild(dayDiv);
            }
            if(!hasContent){weeklyPlan.innerHTML='<div class="empty-tip">还没有制定本周计划哦~快去选择想吃的食谱吧！</div>';}
            document.querySelectorAll('.del-order').forEach(btn=>{
                btn.onclick=(e)=>{
                    const day=parseInt(e.target.dataset.day);const meal=e.target.dataset.meal;const id=parseInt(e.target.dataset.id);
                    weeklyPlanData[day][meal]=weeklyPlanData[day][meal].filter(item=>item.id!==id);
                    storageLayer.saveWeeklyPlanData(weeklyPlanData);
                    updateOrderBadge();renderWeeklyPlan();
                };
            });
            renderShoppingList();
        }

        function renderShoppingList() {
            shoppingList.innerHTML = '<h3>📋 本周采购清单（自动汇总）</h3>';
            const ingredientsMap={};
            for(let day in weeklyPlanData){for(let meal in weeklyPlanData[day]){weeklyPlanData[day][meal].forEach(recipe=>{recipe.ingredients.forEach(ing=>{if(ingredientsMap[ing.name]){ingredientsMap[ing.name].push(ing.amount);}else{ingredientsMap[ing.name]=[ing.amount];}});});}}
            if(Object.keys(ingredientsMap).length===0){shoppingList.innerHTML+='<div class="empty-tip">添加食谱后，这里会自动汇总需要采购的食材~</div>';return;}
            for(let name in ingredientsMap){
                const amounts=ingredientsMap[name];
                const shoppingItem=document.createElement('div');shoppingItem.className='shopping-item';
                shoppingItem.innerHTML=`<span>${name}</span><span>${amounts.join(' + ')}</span>`;
                shoppingList.appendChild(shoppingItem);
            }
        }

        function buildWeeklyPlanNotificationText() {
            const lines = ['孕期本周点单计划'];
            for(let day=1; day<=5; day++) {
                const dayData = weeklyPlanData[day];
                const dayLines = [];
                meals.forEach(meal => {
                    const items = dayData[meal] || [];
                    if(items.length === 0) return;
                    dayLines.push(`${mealNames[meal]}：${items.map(item => item.title).join('、')}`);
                });
                if(dayLines.length > 0) {
                    lines.push(`\n${days[day-1]}`);
                    dayLines.forEach(item => lines.push(`- ${item}`));
                }
            }
            if(lines.length === 1) return '本周暂无点单计划';
            return lines.join('\n');
        }

        async function copyPlanTextFallback(message) {
            try {
                await navigator.clipboard.writeText(message);
                alert('推送失败，已自动复制周计划文案，可手动粘贴发送到微信');
            } catch (err) {
                alert('推送失败，且复制失败，请手动复制周计划内容');
            }
        }

        async function notifyWechat() {
            if(!wechatSendKey) {
                const input = prompt('请输入 Server酱 SendKey（首次配置后会保存在本机）');
                if(!input) return;
                wechatSendKey = input.trim();
                localStorage.setItem(WECHAT_SENDKEY_STORAGE_KEY, wechatSendKey);
            }

            const message = buildWeeklyPlanNotificationText();
            const title = '孩子妈点菜了';
            const url = `${WECHAT_SEND_ENDPOINT_PREFIX}/${wechatSendKey}.send`;
            const body = new URLSearchParams({
                title,
                desp: message
            });

            try {
                notifyWechatBtn.disabled = true;
                notifyWechatBtn.innerText = '发送中...';
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8'},
                    body: body.toString()
                });
                const result = await response.json();
                if(!response.ok || result.code !== 0) {
                    console.error('[微信通知] 发送失败', result);
                    await copyPlanTextFallback(message);
                    return;
                }
                alert('已通知到目标微信');
            } catch (err) {
                console.error('[微信通知] 发送异常', err);
                await copyPlanTextFallback(message);
            } finally {
                notifyWechatBtn.disabled = false;
                notifyWechatBtn.innerText = '通知微信';
            }
        }

        categoryBtns.forEach(btn=>{btn.onclick=()=>{
            const filterType = btn.dataset.filterType;
            const filterValue = btn.dataset.value;
            const categoryGroup = btn.parentElement;
            categoryGroup.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
            btn.classList.add('active');
            renderRecipes(filterType, filterValue);
        };});
        tabItems.forEach(tab=>{tab.onclick=()=>{tabItems.forEach(t=>t.classList.remove('active'));tab.classList.add('active');const page=tab.dataset.page;recipePage.style.display=page==='recipe'?'block':'none';orderPage.style.display=page==='order'?'block':'none';minePage.style.display=page==='mine'?'block':'none';};});
        notifyWechatBtn.onclick = () => notifyWechat();
        clearAllBtn.onclick=()=>{if(confirm('确定要清空本周所有计划吗？此操作不可恢复！')){weeklyPlanData=getDefaultWeeklyPlan();storageLayer.saveWeeklyPlanData(weeklyPlanData);updateOrderBadge();renderWeeklyPlan();alert('本周计划已清空！');}};
        init();
    </script>
</body>
</html>
